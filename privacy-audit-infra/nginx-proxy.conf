# ── DataGuard Privacy Dashboard ───────────────────────────────────────────────
server {
    listen 80;
    server_name dataguard.local;

    location / {
        proxy_pass         http://audit-frontend:80;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}

# ── Audit Backend API + Swagger ───────────────────────────────────────────────
server {
    listen 80;
    server_name api.dataguard.local;

    location / {
        proxy_pass         http://audit-backend:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        # Required for SSE (real-time events)
        proxy_set_header   Connection '';
        proxy_buffering    off;
        proxy_cache        off;
    }
}

