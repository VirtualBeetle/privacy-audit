# ─────────────────────────────────────────────────────────────────────────────
# Render Blueprint — Privacy Audit & Data Transparency Service
#
# This file MUST live at the ROOT of the GitHub repo.
# Render reads it automatically when you connect the repo as a Blueprint.
#
# How to deploy:
#   1. Push this mono-repo to GitHub (github.com/VirtualBeetle/privacy-audit-platform)
#   2. Go to https://dashboard.render.com → New → Blueprint
#   3. Connect the repo → Render finds this file and provisions all services
#   4. Set the secrets marked "sync: false" in the Render dashboard
#
# External services needed (both have free tiers):
#   MongoDB Atlas  → https://www.mongodb.com/atlas  (free M0, 512MB)
#   Mailtrap       → https://mailtrap.io  (free email testing inbox)
# ─────────────────────────────────────────────────────────────────────────────

databases:
  - name: privacy-audit-db
    plan: free
    databaseName: privacy_audit
    user: postgres

  - name: privacy-health-db
    plan: free
    databaseName: health_tenant
    user: postgres

  - name: privacy-social-db
    plan: free
    databaseName: social_tenant
    user: postgres

  - name: privacy-redis
    plan: free
    ipAllowList: []

services:

  # ── Core Audit Backend (NestJS) ─────────────────────────────────────────────
  - type: web
    name: audit-backend
    runtime: docker
    rootDir: privacy-audit-backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: privacy-audit-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: privacy-audit-db
          property: port
      - key: DB_USER
        fromDatabase:
          name: privacy-audit-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: privacy-audit-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: privacy-audit-db
          property: database
      - key: REDIS_HOST
        fromService:
          type: redis
          name: privacy-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: privacy-redis
          property: port
      - key: REDIS_PASSWORD
        fromService:
          type: redis
          name: privacy-redis
          property: password
      # ── Set these manually in Render dashboard ──
      - key: JWT_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false      # MongoDB Atlas URI
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: DEV_TOKEN
        sync: false
      # ── Auto-configured ──
      - key: GOOGLE_CALLBACK_URL
        value: https://audit-backend.onrender.com/api/auth/google/callback
      - key: DASHBOARD_BASE_URL
        value: https://audit-frontend.onrender.com
      - key: PORT
        value: "8080"
      - key: NODE_ENV
        value: production

  # ── Privacy Dashboard (React static site) ─────────────────────────────────
  - type: web
    name: audit-frontend
    runtime: static
    rootDir: privacy-audit-frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://audit-backend.onrender.com

  # ── HealthTrack Backend (Go) ───────────────────────────────────────────────
  - type: web
    name: health-backend
    runtime: docker
    rootDir: privacy-health-tenant/backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8081"
      - key: DB_HOST
        fromDatabase:
          name: privacy-health-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: privacy-health-db
          property: port
      - key: DB_USER
        fromDatabase:
          name: privacy-health-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: privacy-health-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: privacy-health-db
          property: database
      - key: JWT_SECRET
        value: health-demo-secret
      - key: AUDIT_SERVICE_URL
        value: https://audit-backend.onrender.com
      - key: AUDIT_API_KEY
        sync: false

  # ── HealthTrack Frontend (React static site) ───────────────────────────────
  - type: web
    name: health-frontend
    runtime: static
    rootDir: privacy-health-tenant/frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://health-backend.onrender.com

  # ── ConnectSocial Backend (FastAPI) ───────────────────────────────────────
  - type: web
    name: social-backend
    runtime: docker
    rootDir: privacy-social-media-tenant/backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8082"
      - key: DATABASE_URL
        fromDatabase:
          name: privacy-social-db
          property: connectionString
      - key: JWT_SECRET
        value: social-demo-secret
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: AUDIT_SERVICE_URL
        value: https://audit-backend.onrender.com
      - key: AUDIT_API_KEY
        sync: false

  # ── ConnectSocial Frontend (React static site) ────────────────────────────
  - type: web
    name: social-frontend
    runtime: static
    rootDir: privacy-social-media-tenant/frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://social-backend.onrender.com
