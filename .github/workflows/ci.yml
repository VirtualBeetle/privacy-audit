name: CI — Build & Lint

# Runs on every push and PR to main/develop.
# Covers: NestJS backend, React frontend, Go SDK + health tenant, Python SDK + social tenant, JS/TS SDK.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

  # ── NestJS Backend ─────────────────────────────────────────────────────────
  backend:
    name: "Backend — NestJS lint + build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: privacy-audit-backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: privacy-audit-backend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build

  # ── React Dashboard Frontend ───────────────────────────────────────────────
  frontend:
    name: "Frontend — React build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: privacy-audit-frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: privacy-audit-frontend/package-lock.json

      - run: npm ci
      - run: npm run build
        env:
          VITE_API_URL: http://localhost:8080

  # ── JS/TS SDK ──────────────────────────────────────────────────────────────
  sdk-js:
    name: "SDK — JS/TS build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: privacy-audit-sdk/js

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: privacy-audit-sdk/js/package-lock.json

      - run: npm ci
      - run: npm run build

  # ── Go SDK + HealthTrack Backend ───────────────────────────────────────────
  go:
    name: "Go — SDK + Health tenant build"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: |
            privacy-audit-sdk/go/go.sum
            privacy-health-tenant/backend/go.sum

      - name: Build + vet Go SDK
        working-directory: privacy-audit-sdk/go
        run: |
          go build ./...
          go vet ./...

      - name: Build + vet Health tenant
        working-directory: privacy-health-tenant/backend
        run: |
          go build ./...
          go vet ./...

  # ── Python SDK + ConnectSocial Backend ────────────────────────────────────
  python:
    name: "Python — SDK + Social tenant lint"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check Python SDK syntax
        working-directory: privacy-audit-sdk/python
        run: |
          pip install httpx --quiet
          python -m py_compile privacy_audit_sdk/client.py
          python -m py_compile privacy_audit_sdk/__init__.py
          echo "SDK syntax OK"

      - name: Install social tenant deps
        working-directory: privacy-social-media-tenant/backend
        run: |
          pip install -r requirements.txt --quiet 2>/dev/null || true
          echo "Social tenant deps OK"

  # ── Health Tenant Frontend ─────────────────────────────────────────────────
  health-frontend:
    name: "Health Tenant — React build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: privacy-health-tenant/frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci
      - run: npm run build
        env:
          VITE_API_URL: http://localhost:8081

  # ── Social Tenant Frontend ─────────────────────────────────────────────────
  social-frontend:
    name: "Social Tenant — React build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: privacy-social-media-tenant/frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci
      - run: npm run build
        env:
          VITE_API_URL: http://localhost:8062
